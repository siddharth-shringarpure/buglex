name: Smoke Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke-test:
    name: Baseline smoke test (no embeddings)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --frozen

      # Verify that modules import without errors.
      - name: Check modules import without errors
        run: |
          uv run python -c "
          import src.config
          import src.logging_config
          import src.features.data_load
          import src.features.text_prep
          import src.features.tfidf_features
          import src.features.embedding_features
          import src.models.baseline_nb_tfidf
          import src.models.linear_models
          import src.models.centroid
          import src.models.knn
          import src.models.registry
          import src.experiments.evaluate
          print('✓ All imports OK')
          "

      # Prove the main experiment runner initialises without errors.
      - name: Check experiment runner --help
        run: uv run python -m src.run_experiments --help

      # Download embedding model, verify output shape, and benchmark encoding
      # throughput on a small synthetic batch. <1min expected time on GH runner.
      - name: Verify embedding model and benchmark inference
        run: uv run python .github/scripts/check_embeddings.py


      # Run only TF-IDF + NB baseline on `caffe` dataset.
      # Proves reproducibility of environment.
      - name: Run baseline smoke test (caffe, TF-IDF + NB)
        run: uv run python -m src.run_baseline --dataset caffe


      - name: Verify output files were written
        run: |
          test -f results/caffe_baseline_runs.csv || (echo "Missing per-run CSV" && exit 1)
          test -f results/caffe_baseline_summary.csv || (echo "Missing summary CSV" && exit 1)
          echo "✓ Output files present"
