name: Smoke Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke-test:
    name: Baseline smoke test (no embeddings)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --frozen

      # Verify every src/ module imports without errors.
      # The embedding model is loaded lazily so this is safe — no download triggered.
      - name: Check all modules import cleanly
        working-directory: src
        run: |
          uv run python -c "
          import config
          import logging_config
          import features.data_load
          import features.text_prep
          import features.tfidf_features
          import features.embedding_features
          import models.baseline_nb_tfidf
          import models.linear_models
          import models.centroid
          import models.knn
          import models.registry
          import experiments.evaluate
          print('All imports OK')
          "

      # Prove the main experiment runner initialises without errors.
      - name: Check experiment runner --help
        working-directory: src
        run: uv run python run_experiments.py --help

      # Download the embedding model, verify output shape, and benchmark
      # encoding throughput on a small synthetic batch.
      # The model is ~270 MB; GitHub runners have fast internet so this is quick.
      - name: Verify embedding model and benchmark inference
        run: uv run python .github/scripts/check_embeddings.py


      # Run only TF-IDF + NB baseline on `caffe` dataset
      # Requires no model download, proves reproducibility of env.
      - name: Run baseline smoke test (caffe, TF-IDF + NB)
        working-directory: src
        run: uv run python run_baseline.py --dataset caffe


      - name: Verify output files were written
        run: |
          test -f results/caffe_baseline_runs.csv    || (echo "Missing per-run CSV" && exit 1)
          test -f results/caffe_baseline_summary.csv || (echo "Missing summary CSV" && exit 1)
          echo "Output files present."
